<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <link rel="icon" type="image/x-icon" href="img/favicons/favicon.ico">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RH e Fiscal — Integra</title>
  <link rel="stylesheet" href="css/estilo.css">
</head>
<body>
  <div class="painel">
    <div class="painel-sidebar">
      <h3>🏢 RH</h3>
      <nav>
        <a href="#" class="ativo" onclick="mostrarSecao('funcionarios')">👥 Funcionários</a>
        <a href="#" onclick="mostrarSecao('folha')">💰 Folha de Pagamento</a>
        <a href="#" onclick="mostrarSecao('guias')">📋 Guias</a>
        <a href="#" onclick="mostrarSecao('previdencia')">🏦 Minha Previdência</a>
        <a href="manual.html">📖 Manual</a>
        <a href="#" onclick="logout()">🚪 Sair</a>
      </nav>
    </div>
    <div class="painel-conteudo" id="conteudo">
      <h2>Funcionários</h2>
      <button class="btn btn-primario" onclick="novoFuncionario()">+ Novo Funcionário</button>
      <div id="lista-funcionarios" style="margin-top:20px;"></div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script>
    function logout() { localStorage.clear(); window.location.href = 'index.html'; }
    var token = localStorage.getItem('integra_token');
    if (!token) window.location.href = 'login.html';

    async function carregarFuncionarios() {
      var r = await fetch(`${CONFIG.API_URL}/rh/funcionarios`, { headers: { 'Authorization': `Bearer ${token}` } });
      var d = await r.json();
      document.getElementById('lista-funcionarios').innerHTML = d.map(f => `
        <div style="background:var(--branco);padding:14px;border-radius:var(--raio-borda);box-shadow:var(--sombra);margin-bottom:8px;">
          <strong>${f.nome}</strong> — ${f.cargo || 'Sem cargo'} — R$ ${f.salario}<br>
          <span style="font-size:12px;color:var(--texto-medio);">CPF: ${f.cpf || '-'} | PIS: ${f.pis || '-'} | CTPS: ${f.ctps || '-'} | Admissão: ${f.data_admissao || '-'}</span><br>
          <span style="font-size:12px;color:var(--texto-medio);">Anotações: ${f.anotacoes || '-'}</span>
        </div>
      `).join('') || '<p>Nenhum funcionário cadastrado.</p>';
    }

    function novoFuncionario() {
      var nome = prompt('Nome:');
      if (!nome) return;
      var cargo = prompt('Cargo:');
      var salario = parseFloat(prompt('Salário (R$):'));
      var cpf = prompt('CPF:');
      var pis = prompt('PIS:');
      var ctps = prompt('CTPS:');
      var data = prompt('Data de admissão (AAAA-MM-DD):');
      fetch(`${CONFIG.API_URL}/rh/funcionarios`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ nome, cargo, salario, cpf, pis, ctps, data_admissao: data }) }).then(() => carregarFuncionarios());
    }

    function mostrarSecao(secao) {
      var c = document.getElementById('conteudo');
      if (secao === 'folha') { c.innerHTML = '<h2>Folha de Pagamento</h2><input type="month" id="mes-folha"><button class="btn btn-primario" onclick="gerarFolha()">Gerar</button><div id="resultado-folha"></div>'; }
      else if (secao === 'guias') { c.innerHTML = '<h2>Guias Emitidas</h2><div id="lista-guias">Carregando...</div>'; carregarGuias(); }
      else if (secao === 'previdencia') { c.innerHTML = '<h2>Minha Previdência</h2><div id="prev-info">Carregando...</div>'; carregarPrevidencia(); }
      else { c.innerHTML = '<h2>Funcionários</h2><button class="btn btn-primario" onclick="novoFuncionario()">+ Novo Funcionário</button><div id="lista-funcionarios"></div>'; carregarFuncionarios(); }
    }

    async function gerarFolha() {
      var mes = document.getElementById('mes-folha').value;
      var r = await fetch(`${CONFIG.API_URL}/rh/folha`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ mes_referencia: mes }) });
      var d = await r.json();
      document.getElementById('resultado-folha').innerHTML = '<h3>Total: R$ ' + d.total_folha + '</h3>' + d.funcionarios.map(f => `<p>${f.funcionario}: Bruto R$${f.salario_bruto} | INSS R$${f.inss} | IRRF R$${f.irrf} | FGTS R$${f.fgts} | Líquido R$${f.liquido}</p>`).join('');
    }

    async function carregarGuias() {
      var r = await fetch(`${CONFIG.API_URL}/fiscal/guias`, { headers: { 'Authorization': `Bearer ${token}` } });
      var d = await r.json();
      document.getElementById('lista-guias').innerHTML = d.map(g => `<p>${g.tipo} — R$ ${g.valor} — Venc: ${g.data_vencimento} — ${g.status}</p>`).join('') || '<p>Nenhuma guia.</p>';
    }

    async function carregarPrevidencia() {
      var r = await fetch(`${CONFIG.API_URL}/rh/guia-previdencia`, { headers: { 'Authorization': `Bearer ${token}` } });
      var d = await r.json();
      document.getElementById('prev-info').innerHTML = `<p>Contribuição sobre ${d.salarios_contribuicao} salário(s) mínimo(s)</p><p>INSS: R$ ${d.valor_inss.toFixed(2)}</p><p>DAS-MEI: R$ ${d.das_mei.toFixed(2)}</p><p>Complemento: R$ ${d.complemento.toFixed(2)}</p>`;
    }

    carregarFuncionarios();
  </script>
<footer style='text-align:center; padding:30px 20px; font-size:12px; color:var(--texto-medio); border-top:1px solid #E2E8F0; margin-top:40px; line-height:1.6;'>&copy; 2026 Integrativo.App&reg; &bull; Todos os direitos reservados.<br>Desenvolvido por Integrativo.App &bull; CNPJ: 48.893.405/0001-22</footer>
</body>
</html>
