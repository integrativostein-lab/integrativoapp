<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <link rel="icon" type="image/x-icon" href="img/favicons/favicon.ico">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Busque profissionais de saúde integrativa por especialidade, modalidade e localização no Integrativo.App. Encontre atendimento online, presencial e teleconsulta segura.">
  <meta name="keywords" content="buscar profissionais saúde integrativa, terapeuta online, teleconsulta, Ayurveda, MTC, Yoga, Fitoterapia, Integrativo.App">
  <meta property="og:title" content="Buscar Profissionais — Integrativo.App">
  <meta property="og:description" content="Encontre profissionais de saúde integrativa por especialidade e modalidade.">
  <meta property="og:type" content="website">
  <title>Buscar Profissionais — Integrativo.App</title>
  <link rel="stylesheet" href="css/estilo.css">
  <style>
    .busca-container { max-width: 800px; margin: 40px auto; padding: 0 20px; }
    .filtros { background: var(--branco); padding: 24px; border-radius: var(--raio-borda); box-shadow: var(--sombra); margin-bottom: 24px; display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; }
    .filtros .form-grupo { margin-bottom: 0; flex: 1; min-width: 150px; }
    .resultado-card { background: var(--branco); padding: 24px; border-radius: var(--raio-borda); box-shadow: var(--sombra); margin-bottom: 14px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 14px; }
    .resultado-card h3 { color: var(--azul-escuro); margin-bottom: 4px; }
    .resultado-card p { color: var(--texto-medio); font-size: 13px; }
    .sem-resultados { text-align: center; padding: 40px; color: var(--texto-medio); }
    .especialidades-lista {
      background: var(--branco);
      padding: 20px;
      border-radius: var(--raio-borda);
      box-shadow: var(--sombra);
      margin-bottom: 24px;
    }
    .especialidades-lista h3 {
      color: var(--azul-escuro);
      font-size: 16px;
      margin-bottom: 12px;
    }
    .especialidades-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .especialidade-chip {
      border: 1px solid #E2E8F0;
      background: #F8FAFC;
      color: var(--azul-escuro);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: var(--transicao);
    }
    .especialidade-chip:hover,
    .especialidade-chip.ativa {
      background: var(--verde-destaque);
      border-color: var(--verde-destaque);
      color: var(--branco);
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="logo-container">
      <img src="img/logo.png" alt="Logo Integrativo.App" class="logo-img">
      <span class="logo-texto">Integrativo.App</span>
    </a>
    <div class="menu">
      <a href="index.html">Início</a>
      <a href="cadastro.html">Cadastro</a>
      <a href="login.html">Entrar</a>
    </div>
  </nav>

  <div class="busca-container">
    <h2 style="margin-bottom:20px;">Buscar Profissionais</h2>

    <div class="filtros">
      <div class="form-grupo">
        <label>Especialidade</label>
        <select id="filtro-especialidade">
          <option value="">Todas (30 especialidades)</option>
        </select>
      </div>
      <div class="form-grupo">
        <label>Modalidade</label>
        <select id="filtro-modalidade">
          <option value="">Todas</option>
          <option value="online">Online</option>
          <option value="presencial">Presencial</option>
        </select>
      </div>
      <div class="form-grupo">
        <label>CEP</label>
        <input type="text" id="filtro-cep" placeholder="01310-100">
      </div>
      <button class="btn btn-primario" onclick="buscar()">Buscar</button>
    </div>

    <div class="especialidades-lista">
      <h3>Especialidades disponíveis</h3>
      <div class="especialidades-grid" id="lista-especialidades"></div>
    </div>

    <div id="resultados"></div>
  </div>

  <script src="js/config.js"></script>
  <script>
    var select = document.getElementById('filtro-especialidade');
    var listaEspecialidades = document.getElementById('lista-especialidades');
    CONFIG.ESPECIALIDADES.forEach(function(esp) {
      var opt = document.createElement('option');
      opt.value = esp.nome;
      opt.textContent = esp.nome;
      select.appendChild(opt);

      var chip = document.createElement('button');
      chip.type = 'button';
      chip.className = 'especialidade-chip';
      chip.textContent = esp.nome;
      chip.dataset.especialidade = esp.nome;
      chip.onclick = function() {
        select.value = esp.nome;
        document.querySelectorAll('.especialidade-chip').forEach(function(item) {
          item.classList.toggle('ativa', item.dataset.especialidade === esp.nome);
        });
        buscar();
      };
      listaEspecialidades.appendChild(chip);
    });

    select.addEventListener('change', function() {
      var selecionada = select.value;
      document.querySelectorAll('.especialidade-chip').forEach(function(item) {
        item.classList.toggle('ativa', item.dataset.especialidade === selecionada);
      });
    });

    async function buscar() {
      var esp = document.getElementById('filtro-especialidade').value;
      var mod = document.getElementById('filtro-modalidade').value;
      var cep = document.getElementById('filtro-cep').value;
      var params = new URLSearchParams();
      if (esp) params.append('especialidade', esp);
      if (mod) params.append('modalidade', mod);
      if (cep) params.append('cep', cep);

      var r = await fetch(`${CONFIG.API_URL}/profissionais/buscar?${params.toString()}`);
      var dados = await r.json();
      var div = document.getElementById('resultados');

      if (dados.length === 0) {
        div.innerHTML = '<div class="sem-resultados">Nenhum profissional encontrado.</div>';
        return;
      }

      div.innerHTML = dados.map(function(p) {
        return `
        <div class="resultado-card">
          <div>
            <h3>${p.nome}</h3>
            <p>${p.especialidades_lista ? p.especialidades_lista.join(', ') : 'Não informado'}</p>
            <p>${p.cidade || ''} ${p.estado || ''}</p>
            <p>🟢 Online: ${p.atende_online ? 'Sim' : 'Não'} | 📍 Presencial: ${p.atende_presencial ? 'Sim' : 'Não'}</p>
          </div>
          <a href="agendamento.html?prof=${p.id}" class="btn btn-primario" style="font-size:13px;">Agendar</a>
        </div>`;
      }).join('');
    }
    buscar();
  </script>
<footer style='text-align:center; padding:30px 20px; font-size:12px; color:var(--texto-medio); border-top:1px solid #E2E8F0; margin-top:40px; line-height:1.6;'>&copy; 2026 Integrativo.App&reg; &bull; Todos os direitos reservados.<br>Desenvolvido por Integrativo.App &bull; CPF: 089.106.448-69</footer>
</body>
</html>
