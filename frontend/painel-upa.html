<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <link rel="icon" type="image/x-icon" href="img/favicons/favicon.ico">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modo UPA — Integrativo.App</title>
  <link rel="stylesheet" href="css/estilo.css">
  <style>
    .triagem-container { display: flex; gap: 20px; flex-wrap: wrap; }
    .triagem-card { flex: 1; min-width: 300px; background: #FFF; padding: 20px; border-radius: 12px; box-shadow: 0 2px 6px rgba(0,0,0,0.04); }
    .fila-paciente { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #E2E8F0; }
    .risco-vermelho { border-left: 6px solid #E53E3E; }
    .risco-laranja { border-left: 6px solid #DD6B20; }
    .risco-amarelo { border-left: 6px solid #F4A261; }
    .risco-verde { border-left: 6px solid #38A169; }
    .risco-azul { border-left: 6px solid #3182CE; }
    .btn-risco { padding: 8px 14px; border-radius: 6px; border: none; color: #FFF; font-weight: 600; cursor: pointer; margin: 2px; }
  </style>
</head>
<body>
  <div class="painel">
    <div class="painel-sidebar">
      <h3>🏥 UPA</h3>
      <nav>
        <a href="#" class="ativo" onclick="mostrarSecao('triagem')">🩺 Triagem</a>
        <a href="#" onclick="mostrarSecao('fila')">⏳ Fila de Espera</a>
        <a href="#" onclick="mostrarSecao('historico')">📋 Histórico</a>
        <a href="manual.html">📖 Manual</a>
        <a href="#" onclick="logout()">🚪 Sair</a>
      </nav>
    </div>
    <div class="painel-conteudo" id="conteudo">
      <h2>🩺 Triagem — Classificação de Risco</h2>
      <div class="triagem-container">
        <div class="triagem-card">
          <h3>Nova Triagem</h3>
          <div class="form-grupo"><label>Paciente</label><input type="text" id="paciente-nome" placeholder="Nome do paciente"></div>
          <div class="form-grupo"><label>Queixa Principal</label><input type="text" id="queixa" placeholder="Ex: Dor torácica"></div>
          <div class="form-grupo"><label>Sinais Vitais</label><input type="text" id="sinais" placeholder="PA, FC, FR, Temp, SatO2"></div>
          <div class="form-grupo">
            <label>Classificação de Risco (Manchester)</label>
            <div>
              <button class="btn-risco" style="background:#E53E3E;" onclick="classificar('vermelho')">🔴 Emergência (0 min)</button>
              <button class="btn-risco" style="background:#DD6B20;" onclick="classificar('laranja')">🟠 Muito Urgente (10 min)</button>
              <button class="btn-risco" style="background:#F4A261;" onclick="classificar('amarelo')">🟡 Urgente (60 min)</button>
              <button class="btn-risco" style="background:#38A169;" onclick="classificar('verde')">🟢 Pouco Urgente (120 min)</button>
              <button class="btn-risco" style="background:#3182CE;" onclick="classificar('azul')">🔵 Não Urgente (240 min)</button>
            </div>
          </div>
          <button class="btn btn-primario" onclick="registrarTriagem()" style="margin-top:10px;">Registrar Triagem</button>
        </div>
        <div class="triagem-card">
          <h3>Fila de Espera</h3>
          <div id="fila-espera">
            <p style="color:#4A5568;">Nenhum paciente na fila.</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    function classificar(risco) { window.riscoSelecionado = risco; alert('Classificação: ' + risco.toUpperCase()); }
    function registrarTriagem() { alert('Triagem registrada! Paciente encaminhado para a fila de espera.'); }
    function logout() { localStorage.clear(); window.location.href = 'index.html'; }
    function mostrarSecao(s) { document.getElementById('conteudo').innerHTML = '<h2>' + s + '</h2><p>Em desenvolvimento.</p>'; }
  </script>
<footer style='text-align:center; padding:30px 20px; font-size:12px; color:var(--texto-medio); border-top:1px solid #E2E8F0; margin-top:40px; line-height:1.6;'>&copy; 2026 Integrativo.App&reg; &bull; Todos os direitos reservados.<br>Desenvolvido por Integrativo.App &bull; CNPJ: 48.893.405/0001-22</footer>
</body>
</html>
